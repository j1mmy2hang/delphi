<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="theme-color" content="#FFFCF0" />
    <title>Delphi</title>
    <!-- Resolve the theme before first paint, so a dark-mode load never flashes
         the light palette. A stored choice wins over the OS setting. The two
         colours mirror --bg in src/index.css; useTheme keeps the tag in sync
         from there afterwards. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('delphi-theme')
          var dark =
            stored === 'dark' ||
            (!stored && matchMedia('(prefers-color-scheme: dark)').matches)
          document.documentElement.dataset.theme = dark ? 'dark' : 'light'
          if (dark) {
            document
              .querySelector('meta[name="theme-color"]')
              .setAttribute('content', '#100F0F')
          }
        } catch (e) {
          document.documentElement.dataset.theme = 'light'
        }
      })()
    </script>
    <link rel="icon" type="image/webp" href="/favicon.webp" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Hedvig+Letters+Serif:opsz@12..24&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
