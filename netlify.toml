# The web app lives in web/ (this is a monorepo with ios/ + web/). `base` makes
# Netlify build from there; publish/functions/included_files are relative to it.
[build]
  base = "web"
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  included_files = ["system-prompt.md"]

[dev]
  command = "npm run dev"
  targetPort = 5173
  port = 8888
  autoLaunch = false
